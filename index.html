<style>  :root{
    --navy:#0F0A44; --orange:#EC5020; --light:#F2F2F5; --blue:#EAF2FB;
    --ok:#1B8A3A; --notok:#C0392B; --na:#8a8a93; --line:#e0e0e6; --ink:#1c1c28;
    --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Tahoma,sans-serif;background:#e9e9ec;color:var(--ink);font-size:16px;line-height:1.4}
  #app{max-width:780px;margin:0 auto;background:#fff;min-height:100vh}
  /* gate */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;background:linear-gradient(150deg,#0F0A44,#241a63)}
  .gate .box{background:#fff;border-radius:20px;max-width:380px;width:100%;padding:30px 24px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .gate img{height:84px;margin-bottom:12px}
  .gate h1{margin:4px 0 2px;color:var(--navy);font-size:20px}
  .gate p{font-size:13px;color:#888;margin:0 0 20px}
  /* header */
  header.bar{background:var(--navy);color:#fff;padding:calc(10px + env(safe-area-inset-top,0px)) 14px 10px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50}
  header.bar img{height:40px;background:#fff;border-radius:7px;padding:3px}
  header.bar .t b{font-size:15px;display:block;line-height:1.15}
  header.bar .t span{font-size:11px;opacity:.85}
  header.bar .gear{margin-inline-start:auto;background:rgba(255,255,255,.12);border:0;color:#fff;font-size:20px;cursor:pointer;width:40px;height:40px;border-radius:10px}
  .stripe{height:4px;background:var(--orange)}
  .wrap{padding:14px 14px 120px}
  .card{border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;background:#fff}
  .card>h3{margin:0;background:var(--navy);color:#fff;font-size:13px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;font-weight:700}
  .card>h3 small{font-weight:400;opacity:.8;font-size:11px}
  .card .body{padding:14px}
  label.fld{display:block;font-size:12px;font-weight:700;color:var(--navy);margin:10px 0 4px}
  label.fld:first-child{margin-top:0}
  input,select,textarea{width:100%;padding:12px;border:1.5px solid var(--line);border-radius:11px;font-size:16px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  @media(max-width:560px){.grid2{grid-template-columns:1fr}}
  .stage{background:var(--orange);color:#fff;font-weight:800;font-size:14px;padding:11px 14px;border-radius:12px;margin:18px 0 10px;text-align:center;letter-spacing:.3px}
  .sec{font-size:12px;font-weight:800;color:var(--navy);background:#FCE4D6;padding:8px 12px;border-radius:9px;margin:14px 0 8px}
  .item{border:1.5px solid var(--line);border-radius:13px;padding:12px;margin-bottom:10px;transition:border-color .2s}
  .item.flag{border-color:var(--notok)}
  .item .q{font-size:14px;font-weight:600;margin-bottom:2px}
  .item .q .ar{display:block;color:#666;font-size:13px;font-weight:400;margin-top:1px}
  .item .crit{font-size:11px;color:#9a9aa2;margin:4px 0 10px}
  .item .crit b{color:var(--orange)}
  .seg{display:flex;gap:7px}
  .seg button{flex:1;padding:11px 4px;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;color:#888;transition:.12s}
  .seg button:active{transform:scale(.96)}
  .seg button.on[data-v=OK]{background:var(--ok);color:#fff;border-color:var(--ok)}
  .seg button.on[data-v="Not OK"]{background:var(--notok);color:#fff;border-color:var(--notok)}
  .seg button.on[data-v="N/A"]{background:var(--na);color:#fff;border-color:var(--na)}
  .rmk{margin-top:9px;font-size:14px;min-height:42px;resize:vertical}
  .photos{display:flex;flex-wrap:wrap;gap:10px;margin-top:6px}
  .ph{position:relative;width:96px;height:96px;border-radius:11px;overflow:hidden;border:1.5px solid var(--line)}
  .ph img{width:100%;height:100%;object-fit:cover;display:block}
  .ph .x{position:absolute;top:3px;inset-inline-end:3px;background:rgba(192,57,43,.95);color:#fff;border:0;border-radius:50%;width:24px;height:24px;font-size:15px;cursor:pointer;line-height:1}
  .ph .stamp{position:absolute;bottom:0;left:0;right:0;background:rgba(15,10,68,.78);color:#fff;font-size:8px;padding:3px 4px;line-height:1.25;border-inline-start:3px solid var(--orange)}
  .addph{width:96px;height:96px;border:2px dashed var(--orange);border-radius:11px;background:#fff7f3;color:var(--orange);font-size:11px;font-weight:800;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  .addph span{font-size:28px;line-height:1}
  .note{font-size:11px;color:#9a9aa2;margin-top:8px;line-height:1.6}
  footer.sb{position:fixed;bottom:0;left:0;right:0;z-index:60;background:#fff;border-top:1px solid var(--line);padding:11px 14px calc(11px + var(--safe-b));display:flex;gap:10px;max-width:780px;margin:0 auto}
  .pct{align-self:center;font-size:13px;font-weight:800;white-space:nowrap;color:#777}
  .btn{flex:1;background:var(--orange);color:#fff;border:0;border-radius:13px;padding:15px;font-size:16px;font-weight:800;cursor:pointer}
  .btn:active{transform:scale(.98)}
  .btn:disabled{opacity:.5}
  .btn.ghost{flex:0 0 auto;background:#fff;color:var(--navy);border:2px solid var(--navy);padding:15px 18px}
  .modal{position:fixed;inset:0;background:rgba(15,10,68,.6);display:none;align-items:flex-end;justify-content:center;z-index:100}
  .modal.show{display:flex}
  .sheet{background:#fff;border-radius:20px 20px 0 0;max-width:780px;width:100%;overflow:hidden;animation:up .25s ease}
  @media(min-width:560px){.modal{align-items:center}.sheet{border-radius:20px;max-width:440px}}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
  .sheet h3{margin:0;background:var(--navy);color:#fff;padding:14px 18px;font-size:16px}
  .sheet .c{padding:18px 18px calc(18px + var(--safe-b))}
  .toast{position:fixed;bottom:calc(96px + var(--safe-b));left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:26px;font-size:14px;font-weight:600;z-index:200;opacity:0;transition:.3s;pointer-events:none;max-width:90%;text-align:center}
  .toast.show{opacity:1}
  .hidden{display:none!important}
  /* login */
  .login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;background:linear-gradient(150deg,#0F0A44,#241a63)}
  .login .box{background:#fff;border-radius:20px;max-width:380px;width:100%;padding:30px 24px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3)}
  .login img{height:80px;margin-bottom:10px}
  .login h1{margin:4px 0 2px;color:var(--navy);font-size:19px}
  .login p{font-size:13px;color:#888;margin:0 0 18px}
  .login .lock{font-size:12px;color:#9a9aa2;margin-top:14px;line-height:1.6}
  .roletag{display:inline-block;font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px;margin-inline-start:6px}
  .roletag.admin{background:#EC5020;color:#fff}
  .roletag.user{background:#EAF2FB;color:#0F0A44}
  /* sidebar */
  .drawer{position:fixed;inset:0;z-index:90;display:none}
  .drawer.show{display:block}
  .drawer .ov{position:absolute;inset:0;background:rgba(15,10,68,.5)}
  .drawer .panel{position:absolute;top:0;bottom:0;inset-inline-start:0;width:84%;max-width:340px;background:#fff;box-shadow:2px 0 20px rgba(0,0,0,.25);display:flex;flex-direction:column;animation:slidein .22s ease}
  @keyframes slidein{from{transform:translateX(-100%)}to{transform:none}}
  .drawer .dh{background:var(--navy);color:#fff;padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px;display:flex;align-items:center;gap:10px}
  .drawer .dh img{height:34px;background:#fff;border-radius:6px;padding:3px}
  .drawer .dh b{font-size:14px;display:block}.drawer .dh span{font-size:11px;opacity:.8}
  .drawer .list{flex:1;overflow:auto;padding:10px}
  .rep{border:1.5px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:9px;cursor:pointer;position:relative}
  .rep.active{border-color:var(--orange);background:#fff7f3}
  .rep .rt{font-weight:800;font-size:14px;color:var(--navy);padding-inline-end:50px}
  .rep .rm{font-size:11px;color:#888;margin-top:3px}
  .rep .st{position:absolute;top:11px;inset-inline-end:11px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px}
  .rep .st.draft{background:#FCE4D6;color:#C0392B}
  .rep .st.done{background:#DEF3E5;color:#1B8A3A}
  .rep .who{font-size:10px;color:#aaa;margin-top:2px}
  .rep .del{position:absolute;bottom:8px;inset-inline-end:10px;background:none;border:0;color:#C0392B;font-size:11px;font-weight:700;cursor:pointer}
  .rep .bar2{height:5px;background:#eee;border-radius:3px;margin-top:7px;overflow:hidden}
  .rep .bar2 i{display:block;height:100%;background:var(--orange)}
  .empty{text-align:center;color:#aaa;font-size:13px;padding:30px 10px}
  /* FAB */
  .fab{position:fixed;inset-inline-end:18px;bottom:calc(86px + env(safe-area-inset-bottom,0px));width:58px;height:58px;border-radius:50%;background:var(--orange);color:#fff;border:0;font-size:30px;box-shadow:0 8px 20px rgba(236,80,32,.45);z-index:55;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .fab:active{transform:scale(.94)}
  /* signature */
  .sigwrap{border:1.5px dashed var(--orange);border-radius:12px;background:#fffdfb;position:relative}
  .sigwrap canvas{width:100%;height:160px;display:block;touch-action:none;border-radius:12px}
  .sigwrap .clr{position:absolute;top:8px;inset-inline-end:8px;background:#fff;border:1px solid var(--line);border-radius:8px;font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;color:#C0392B}
  .sighint{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;color:#ccc;font-size:13px;pointer-events:none}
  /* user rows */
  .urow{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:7px}
  .urow .ui{flex:1;font-size:13px}.urow .ui b{color:var(--navy)}.urow .ui span{color:#999;font-size:11px;display:block}
  .urow .udel{background:none;border:0;color:#C0392B;font-size:18px;cursor:pointer}
  .menubtn{background:rgba(255,255,255,.12);border:0;color:#fff;font-size:20px;width:40px;height:40px;border-radius:10px;cursor:pointer}
  .tabs{display:flex;background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40}
  .tabbtn{flex:1;padding:13px 6px;border:0;background:none;font-size:13px;font-weight:800;color:#888;cursor:pointer;border-bottom:3px solid transparent}
  .tabbtn.on{color:var(--navy);border-bottom-color:var(--orange)}
  .projinfo{font-size:12px;color:var(--navy);background:#EAF2FB;border-radius:8px;padding:8px 10px;margin-top:6px;min-height:0}
  .projinfo:empty{display:none}
  .qedit{border:1px solid var(--line);border-radius:10px;padding:8px;margin-bottom:8px;display:flex;flex-direction:column;gap:6px}
  .qedit input{font-size:13px;padding:8px}
  .rulerow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:11px;padding:11px;margin-bottom:9px}
  .rulerow .ui{flex:1}.rulerow .ui b{color:var(--navy);font-size:13px}.rulerow .ui span{display:block;color:#999;font-size:11px}
  .toggle{width:50px;height:28px;border-radius:16px;border:0;background:#ccc;position:relative;cursor:pointer;flex:0 0 auto;transition:.2s}
  .toggle.on{background:var(--ok)}
  .toggle i{position:absolute;top:3px;inset-inline-start:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:.2s}
  .toggle.on i{inset-inline-start:25px}
  /* question type controls */
  .qtype-rating{display:flex;gap:6px;font-size:30px;cursor:pointer}
  .qtype-rating .star{color:#ddd;transition:.1s}.qtype-rating .star.on{color:#f5a623}
  .qtype-yn{display:flex;gap:8px}.qtype-yn button{flex:1;padding:11px;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-weight:800;color:#888;cursor:pointer}
  .qtype-yn button.on[data-v=Yes]{background:var(--ok);color:#fff;border-color:var(--ok)}
  .qtype-yn button.on[data-v=No]{background:var(--notok);color:#fff;border-color:var(--notok)}
  .qtype-measure{display:flex;gap:8px;align-items:center}.qtype-measure input{flex:1}
  .qtype-measure .unit{font-size:12px;font-weight:800;color:var(--navy);background:var(--light);padding:8px 12px;border-radius:8px;white-space:nowrap}
  .nc-box{margin-top:9px;border:1.5px solid var(--notok);border-radius:10px;padding:9px;background:#fff5f4}
  .nc-box label{font-size:11px;font-weight:800;color:var(--notok);display:block;margin-bottom:3px}
  .nc-box textarea{margin-bottom:7px}
  .reqphoto{margin-top:8px;border:1px dashed var(--orange);border-radius:9px;padding:8px}
  .reqphoto .lbl{font-size:11px;font-weight:700;color:var(--orange);margin-bottom:5px}
  .qphoto{width:70px;height:70px;border-radius:8px;object-fit:cover;border:1px solid var(--line)}
  .qopts{display:flex;flex-direction:column;gap:6px}
  .qopts label{display:flex;align-items:center;gap:8px;font-size:13px;border:1px solid var(--line);border-radius:9px;padding:9px;cursor:pointer}
  .qopts input{width:auto;margin:0}
  .typebadge{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;background:#EAF2FB;color:var(--navy);margin-inline-start:6px}
  .spinner{width:42px;height:42px;border:4px solid #eee;border-top-color:var(--orange);border-radius:50%;animation:spin 1s linear infinite;margin:30px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loadwrap{text-align:center;padding:40px;color:#888}
  .sel-type{padding:8px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-weight:700;width:100%;margin-top:6px}
  .sync{font-size:10px;padding:2px 8px;border-radius:10px;background:#DEF3E5;color:var(--ok);font-weight:800}
  .sync.off{background:#FCE4D6;color:#C0392B}
  /* dashboard */
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  @media(min-width:560px){.kpis{grid-template-columns:repeat(4,1fr)}}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 10px;text-align:center}
  .kpi .kv{font-size:28px;font-weight:800;line-height:1}
  .kpi .kl{font-size:12px;font-weight:700;color:var(--navy);margin-top:5px}
  .kpi .kle{font-size:10px;color:#9a9aa2}
  .dashrow{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .donut2{width:104px;height:104px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .hole2{width:70px;height:70px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .hole2 b{font-size:20px;color:var(--navy)}
  .brow2{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:12px}
  .brow2 .lb2{width:80px;font-weight:700;color:#555}
  .track2{flex:1;height:14px;background:#eee;border-radius:7px;overflow:hidden}
  .prow{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .prow .pn{flex:1;font-weight:700;color:var(--navy)}
  .prow .pc{font-size:11px;color:#888}
  .prow .pnc{font-size:11px;font-weight:800;color:#C0392B;background:#fbeae6;padding:2px 8px;border-radius:10px}
  .prow .pok{color:#1B8A3A;font-weight:800}
  .ncitem{border:1px solid var(--line);border-inline-start:4px solid #C0392B;border-radius:9px;padding:9px 11px;margin-bottom:8px}
  .ncitem .ncsite{font-size:11px;color:#888}
  .ncitem .nctitle{font-size:13px;font-weight:700;color:var(--navy);margin:2px 0}
  .ncitem .ncf{font-size:12px;color:#444;margin-top:3px}
  .ncitem .nca{font-size:12px;color:#C0392B;margin-top:2px}

function $(id){return document.getElementById(id)}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(m){let t=$('toast');if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t)}t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600)}
function kk(s,c,i){return s+'_'+c+'_'+i}

// ===== config (template/projects/rules) stored in /config/app =====
async function loadConfig(){
  const ref=doc(db,'config','app');
  const snap=await getDoc(ref);
  if(snap.exists()){ CFG=snap.data(); }
  else {
    CFG={template:DEFAULT_STAGES, projects:[], rules:{allItems:true,photo:true,signature:true}, recipient:SESSION.email};
    if(SESSION.role==='admin'){ try{await setDoc(ref,CFG);}catch(e){} }
  }
  if(!CFG.template) CFG.template=DEFAULT_STAGES;
  if(!CFG.rules) CFG.rules={allItems:true,photo:true,signature:true};
  if(!CFG.projects) CFG.projects=[];
}
async function saveConfig(){ if(SESSION.role!=='admin')return; await setDoc(doc(db,'config','app'),CFG); }

// ===== total/counts respect template =====
function total(){let n=0;TPL.forEach(s=>s.secs.forEach(c=>n+=c.items.length));return n}
function isAnswered(a){ if(!a)return false; if(a.type==='okna')return !!a.status; if(a.type==='rating')return a.rating>0; if(a.type==='yesno')return !!a.yn; if(a.type==='text')return (a.text||'').trim().length>0; if(a.type==='measure')return (a.measure||'').toString().trim().length>0; if(a.type==='choice')return !!a.choice; return !!a.status; }
function counts(){let done=0,ok=0,no=0,na=0;TPL.forEach((st,si)=>st.secs.forEach((sec,ci)=>sec.items.forEach((it,ii)=>{const a=answers[kk(si,ci,ii)];if(isAnswered(a)){done++;if(a.type==='okna'){if(a.status==='OK')ok++;else if(a.status==='Not OK')no++;else na++;}else if(a.type==='yesno'){if(a.yn==='Yes')ok++;else no++;}}})));return{done,ok,no,na,total:total()}}
function itemType(it){ return (it[3]&&it[3].type)||'okna'; }
function itemReqPhoto(it){ return !!(it[3]&&it[3].photo); }
function itemRequired(it){ return it[3]?it[3].required!==false:true; }
function itemOptions(it){ return (it[3]&&it[3].options)||[]; }
function itemUnit(it){ return (it[3]&&it[3].unit)||''; }


// ===== AUTH FLOW =====
onAuthStateChanged(auth, async (user)=>{
  if(!user){ SESSION=null; if(reportsUnsub){reportsUnsub();reportsUnsub=null;} renderLogin(); return; }
  loading('جاري الدخول...');
  try{
    const uref=doc(db,'users',user.uid);
    let usnap=await getDoc(uref);
    if(!usnap.exists()){
      // first ever user becomes admin; otherwise check pending provisioning
      const usersSnap=await getDocs(collection(db,'users'));
      let role='user', name=user.email.split('@')[0];
      if(usersSnap.empty){ role='admin'; }
      else {
        try{ const pend=await getDoc(doc(db,'pending',user.email.toLowerCase())); if(pend.exists()){ const pd=pend.data(); role=pd.role||'user'; name=pd.name||name; } }catch(e){}
      }
      await setDoc(uref,{email:user.email,name,role,created:serverTimestamp()});
      usnap=await getDoc(uref);
    }
    const u=usnap.data();
    SESSION={uid:user.uid,email:user.email,name:u.name||user.email,role:u.role||'user'};
    await loadConfig();
    renderHome();
  }catch(e){ $('app').innerHTML='<div class="loadwrap">خطأ: '+esc(e.message)+'<br><br><button class="btn" style="max-width:200px;margin:0 auto" onclick="location.reload()">إعادة المحاولة</button></div>'; }
});

function renderLogin(){
  $('app').innerHTML='<div class="login"><div class="box">'+
   '<img src="'+LOGO+'"><h1>Maintenance QA/QC</h1><p>قائمة تدقيق جودة الصيانة — ETECHS</p>'+
   '<label class="fld" style="text-align:start">الإيميل / Email</label><input id="l_email" type="email" inputmode="email" autocapitalize="off" autocorrect="off" placeholder="name@etechs.com">'+
   '<label class="fld" style="text-align:start">كلمة المرور / Password</label><input id="l_pass" type="password" placeholder="••••••">'+
   '<button class="btn" style="width:100%;margin-top:16px" onclick="doLogin()">دخول / Login</button>'+
   '<p class="lock" id="loginNote">أول حساب يُسجّل يصبح المدير تلقائياً. بعدها يضيف المدير المستخدمين.</p>'+
   '</div></div>';
}
window.doLogin=async function(){
  const e=($('l_email').value||'').trim(), p=$('l_pass').value||'';
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e)||p.length<6){toast('إيميل صحيح وكلمة مرور 6 خانات+');return}
  const note=$('loginNote'); if(note)note.textContent='جاري المعالجة...';
  try{ await signInWithEmailAndPassword(auth,e,p); }
  catch(err){
    if(err.code==='auth/user-not-found'||err.code==='auth/invalid-credential'){
      // try create (first admin or admin-provisioned email signing in first time)
      try{ await createUserWithEmailAndPassword(auth,e,p); }
      catch(err2){ toast(authMsg(err2.code)); if(note)note.textContent='بيانات الدخول غير صحيحة'; }
    } else { toast(authMsg(err.code)); }
  }
};
function authMsg(code){
  if(code==='auth/email-already-in-use')return 'الإيميل مسجّل — كلمة المرور غير صحيحة';
  if(code==='auth/weak-password')return 'كلمة المرور ضعيفة (6 خانات+)';
  if(code==='auth/invalid-email')return 'إيميل غير صحيح';
  if(code==='auth/network-request-failed')return 'لا يوجد اتصال إنترنت';
  return 'تعذّر الدخول';
}
window.logout=function(){ signOut(auth); };

// ===== HOME + reports list (realtime) =====
function renderHome(){
  let h='<header class="bar"><img src="'+LOGO+'"><div class="t"><b>QA/QC Reports</b><span>'+esc(SESSION.name)+(SESSION.role==='admin'?' (Admin)':'')+'</span></div>'+
   '<button class="gear" onclick="openDashboard()" title="لوحة المعلومات">📊</button>'+
   (SESSION.role==='admin'?'<button class="gear" onclick="openAdmin()" title="لوحة التحكم">🛠</button>':'')+
   '<button class="gear" onclick="openSet()">⚙</button>'+
   '<button class="gear" onclick="logout()" title="خروج">⎋</button></header><div class="stripe"></div>';
  h+='<div class="wrap"><div class="card"><h3>'+(SESSION.role==='admin'?'كل التقارير':'تقاريري')+' <small id="syncBadge"></small></h3><div class="body" id="homeList"><div class="loadwrap"><div class="spinner"></div></div></div></div></div>';
  h+='<button class="fab" onclick="newReport()">＋</button>';
  h+='<div class="toast" id="toast"></div>';
  $('app').innerHTML=h;
  subscribeReports();
}
function subscribeReports(){
  if(reportsUnsub){reportsUnsub();reportsUnsub=null;}
  let qy;
  try{
    if(SESSION.role==='admin') qy=query(collection(db,'reports'),orderBy('updated','desc'));
    else qy=query(collection(db,'reports'),where('owner','==',SESSION.uid));
  }catch(e){ qy=collection(db,'reports'); }
  reportsUnsub=onSnapshot(qy,(snap)=>{
    REPORTS=[]; snap.forEach(d=>REPORTS.push(Object.assign({id:d.id},d.data())));
    REPORTS.sort((a,b)=>(b.updatedMs||0)-(a.updatedMs||0));
    paintHome();
    const b=$('syncBadge'); if(b)b.innerHTML='<span class="sync">● متصل</span>';
  },(err)=>{
    const l=$('homeList'); if(l)l.innerHTML='<div class="empty">تعذّر تحميل التقارير: '+esc(err.message)+'</div>';
    const b=$('syncBadge'); if(b)b.innerHTML='<span class="sync off">● غير متصل</span>';
  });
}
function paintHome(){
  const l=$('homeList'); if(!l)return;
  if(!REPORTS.length){ l.innerHTML='<div class="empty">لا توجد تقارير بعد.<br>اضغط ＋ لبدء تقرير جديد.</div>'; return; }
  l.innerHTML=REPORTS.map(r=>repCard(r)).join('');
}
function repCard(r){
  const c=r.counts||{done:0,total:0};
  const pc=c.total?Math.round(c.done/c.total*100):0;
  const stat=r.status==='done'?'<span class="st done">مقفول</span>':'<span class="st draft">مفتوح</span>';
  return '<div class="rep" onclick="openReport(\''+r.id+'\')">'+
    '<div class="rt">'+esc((r.form&&r.form.site)||'(بدون محطة)')+'</div>'+stat+
    '<div class="rm">LOA: '+esc((r.form&&r.form.loa)||'—')+' · '+esc((r.form&&r.form.date)||'')+' · '+c.done+'/'+c.total+'</div>'+
    (SESSION.role==='admin'?'<div class="who">👤 '+esc(r.ownerName||'')+'</div>':'')+
    '<div class="bar2"><i style="width:'+pc+'%"></i></div>'+
    '<button class="del" onclick="event.stopPropagation();delReport(\''+r.id+'\')">حذف</button></div>';
}

window.newReport=async function(){
  const id=uid();
  const rep={id,owner:SESSION.uid,ownerName:SESSION.name,ownerEmail:SESSION.email,status:'draft',
    createdMs:Date.now(),updatedMs:Date.now(),updated:serverTimestamp(),
    form:{},answers:{},photos:[],sig:null,counts:{done:0,total:0},
    tpl:CFG.template, rules:CFG.rules};
  loading('جاري الإنشاء...');
  try{ await setDoc(doc(db,'reports',id),rep); CUR=rep; openReportObj(rep); }
  catch(e){ toast('تعذّر الإنشاء: '+e.message); renderHome(); }
};
window.openReport=async function(id){
  loading();
  try{ const s=await getDoc(doc(db,'reports',id)); if(!s.exists()){toast('غير موجود');renderHome();return;} openReportObj(Object.assign({id},s.data())); }
  catch(e){ toast('تعذّر الفتح'); renderHome(); }
};
window.delReport=async function(id){
  if(!confirm('حذف هذا التقرير نهائياً؟'))return;
  try{ await deleteDoc(doc(db,'reports',id)); toast('تم الحذف'); }catch(e){ toast('تعذّر الحذف'); }
};
async function saveCur(notify){
  if(!CUR)return;
  CUR.form=form(); CUR.answers=answers; CUR.photos=photos; CUR.sig=sig; CUR.counts=counts(); CUR.updatedMs=Date.now();
  try{ await updateDoc(doc(db,'reports',CUR.id),{form:CUR.form,answers:CUR.answers,photos:CUR.photos,sig:CUR.sig,counts:CUR.counts,status:CUR.status,updatedMs:CUR.updatedMs,updated:serverTimestamp()}); if(notify)toast('تم الحفظ'); }
  catch(e){ if(notify)toast('تعذّر الحفظ (تحقق من الإنترنت)'); }
}

function itemHTML(st,sec,it,si,ci,ii){
  const key=kk(si,ci,ii); const tp=itemType(it); const a=answers[key]||{};
  const badge='<span class="typebadge">'+typeLabel(tp)+'</span>';
  let ctrl='';
  if(tp==='okna'){
    ctrl='<div class="seg" data-k="'+key+'">'+['OK','Not OK','N/A'].map(v=>'<button data-v="'+v+'" onclick="setOKNA(\''+key+'\',\''+v+'\',this)">'+v+'</button>').join('')+'</div>';
  } else if(tp==='rating'){
    ctrl='<div class="qtype-rating" id="rt_'+key+'">'+[1,2,3,4,5].map(n=>'<span class="star" data-n="'+n+'" onclick="setRating(\''+key+'\','+n+')">★</span>').join('')+'</div>';
  } else if(tp==='yesno'){
    ctrl='<div class="qtype-yn" data-k="'+key+'">'+['Yes','No'].map(v=>'<button data-v="'+v+'" onclick="setYN(\''+key+'\',\''+v+'\',this)">'+(v==='Yes'?'نعم':'لا')+'</button>').join('')+'</div>';
  } else if(tp==='text'){
    ctrl='<textarea class="rmk" placeholder="الإجابة" onchange="setText(\''+key+'\',this.value)">'+esc(a.text||'')+'</textarea>';
  } else if(tp==='measure'){
    ctrl='<div class="qtype-measure"><input type="number" inputmode="decimal" placeholder="القيمة" value="'+esc(a.measure||'')+'" onchange="setMeasure(\''+key+'\',this.value)">'+(itemUnit(it)?'<span class="unit">'+esc(itemUnit(it))+'</span>':'')+'</div>';
  } else if(tp==='choice'){
    ctrl='<div class="qopts">'+itemOptions(it).map((o,oi)=>'<label><input type="radio" name="ch_'+key+'" '+(a.choice===o?'checked':'')+' onclick="setChoice(\''+key+'\',\''+esc(o).replace(/'/g,"\\'")+'\')"> '+esc(o)+'</label>').join('')+'</div>';
  }
  // NC box (finding + required action) for okna=Not OK or yesno=No
  let nc='';
  const showNC=(tp==='okna'&&a.status==='Not OK')||(tp==='yesno'&&a.yn==='No');
  if(showNC){
    nc='<div class="nc-box"><label>Finding / الملاحظة</label><textarea onchange="setNC(\''+key+'\',\'finding\',this.value)">'+esc(a.finding||'')+'</textarea>'+
       '<label>Required Action / الإجراء المطلوب</label><textarea onchange="setNC(\''+key+'\',\'action\',this.value)">'+esc(a.action||'')+'</textarea></div>';
  }
  // per-question photo
  let ph='';
  if(itemReqPhoto(it)){
    ph='<div class="reqphoto"><div class="lbl">📷 صورة مطلوبة لهذا البند</div>'+
       (a.photo?'<img class="qphoto" src="'+a.photo+'">':'')+
       '<button class="btn ghost" style="flex:1;width:100%;margin-top:6px;padding:9px" onclick="qPhotoFor(\''+key+'\')">'+(a.photo?'تغيير الصورة':'التقاط صورة')+'</button></div>';
  }
  // remarks (always available except text)
  let rmk = (tp==='text')?'':'<textarea class="rmk" placeholder="ملاحظات / Remarks" onchange="setRemark(\''+key+'\',this.value)">'+esc(a.remark||'')+'</textarea>';
  return '<div class="item" id="it_'+key+'"><div class="q">'+esc(it[0])+badge+'<span class="ar">'+esc(it[1])+'</span></div>'+
    (it[2]?'<div class="crit">المعيار / Acceptance: <b>'+esc(it[2])+'</b></div>':'')+
    ctrl+nc+ph+rmk+'</div>';
}
function typeLabel(tp){return ({okna:'OK/NotOK',rating:'تقييم',text:'نص',measure:'قياس',yesno:'نعم/لا',choice:'قائمة'})[tp]||tp}

// ===== answer setters =====
function ensureA(key){ const it=keyItem(key); answers[key]=answers[key]||{type:itemType(it)}; if(!answers[key].type)answers[key].type=itemType(it); return answers[key]; }
function keyItem(key){ const[si,ci,ii]=key.split('_').map(Number); return TPL[si].secs[ci].items[ii]; }
window.setOKNA=function(key,v,btn){const a=ensureA(key);a.status=(a.status===v?null:v);const seg=btn.parentNode;seg.querySelectorAll('button').forEach(b=>b.classList.remove('on'));if(a.status)btn.classList.add('on');refreshNC(key);upd();};
window.setYN=function(key,v,btn){const a=ensureA(key);a.yn=(a.yn===v?null:v);const seg=btn.parentNode;seg.querySelectorAll('button').forEach(b=>b.classList.remove('on'));if(a.yn)btn.classList.add('on');refreshNC(key);upd();};
window.setRating=function(key,n){const a=ensureA(key);a.rating=(a.rating===n?0:n);paintStars(key);upd();};
function paintStars(key){const box=$('rt_'+key);if(!box)return;const a=answers[key]||{};box.querySelectorAll('.star').forEach(s=>{s.classList.toggle('on',Number(s.dataset.n)<=(a.rating||0));});}
window.setText=function(key,v){ensureA(key).text=v;upd();};
window.setMeasure=function(key,v){ensureA(key).measure=v;upd();};
window.setChoice=function(key,v){ensureA(key).choice=v;upd();};
window.setRemark=function(key,v){ensureA(key).remark=v;};
window.setNC=function(key,field,v){ensureA(key)[field]=v;};
function refreshNC(key){ // re-render just this item to show/hide NC box
  const a=answers[key]; const it=keyItem(key); const[si,ci,ii]=key.split('_').map(Number);
  const cont=$('it_'+key); if(!cont)return;
  const st=TPL[si],sec=st.secs[ci];
  cont.outerHTML=itemHTML(st,sec,it,si,ci,ii);
  // restore visual state
  const tp=itemType(it);
  if(tp==='okna'){const seg=document.querySelector('.seg[data-k="'+key+'"]');if(seg&&a.status){const b=seg.querySelector('[data-v="'+a.status+'"]');if(b)b.classList.add('on');}}
  if(tp==='yesno'){const seg=document.querySelector('.qtype-yn[data-k="'+key+'"]');if(seg&&a.yn){const b=seg.querySelector('[data-v="'+a.yn+'"]');if(b)b.classList.add('on');}}
}
function restoreAnswers(){
  TPL.forEach((st,si)=>st.secs.forEach((sec,ci)=>sec.items.forEach((it,ii)=>{
    const key=kk(si,ci,ii); const a=answers[key]; if(!a)return; const tp=itemType(it);
    if(tp==='okna'&&a.status){const seg=document.querySelector('.seg[data-k="'+key+'"]');if(seg){const b=seg.querySelector('[data-v="'+a.status+'"]');if(b)b.classList.add('on');}}
    if(tp==='yesno'&&a.yn){const seg=document.querySelector('.qtype-yn[data-k="'+key+'"]');if(seg){const b=seg.querySelector('[data-v="'+a.yn+'"]');if(b)b.classList.add('on');}}
    if(tp==='rating')paintStars(key);
  })));
}
function upd(){const c=counts();const e=$('pct');if(e){e.innerHTML=c.done+'/'+c.total+' · 📷'+photos.length;e.style.color=(c.done===c.total&&photos.length>0)?'#1B8A3A':'#777';}}

// ===== form / project =====
function fld(id,label,ph,val,type){return '<div><label class="fld">'+label+'</label><input id="'+id+'" type="'+(type||'text')+'" placeholder="'+(ph||'')+'" value="'+esc(val||'')+'"></div>'}
function sel(id,label,arr,val){return '<div><label class="fld">'+label+'</label><select id="'+id+'">'+arr.map(o=>'<option'+(o===val?' selected':'')+'>'+o+'</option>').join('')+'</select></div>'}
window.onProj=function(){const s=$('f_proj');if(!s)return;const i=s.value;const box=$('projInfo');if(i===''||!CFG.projects[i]){if(box)box.innerHTML='';return;}const p=CFG.projects[i];if(box)box.innerHTML='<b>'+esc(p.client)+'</b> · عقد '+esc(p.contract)+' · '+esc(p.city);};
function form(){const g=id=>{const e=$(id);return e?e.value:''};const pi=g('f_proj');const p=(pi!==''&&CFG.projects[pi])?CFG.projects[pi]:null;return{projIdx:pi,project:p?p.name:'',client:p?p.client:'',contract:p?p.contract:'',city:p?p.city:'',site:g('f_site'),loa:g('f_loa'),service:g('f_service'),system:g('f_system'),team:g('f_team'),date:g('f_date'),by:g('f_by'),workdone:g('f_workdone'),notes:g('f_notes')}}
window.goHome=async function(){await saveCur(false);CUR=null;renderHome();};
window.saveCur=saveCur;

// ===== photos (general) =====
window.addPhoto=function(){$('cam').click()};
window.onPhoto=function(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{const fin=(la,ln)=>stamp(e.target.result,la,ln,(d)=>{photos.push(d);renderPhotos();});if(navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>fin(p.coords.latitude,p.coords.longitude),()=>fin(null,null),{enableHighAccuracy:true,timeout:6000,maximumAge:0});}else fin(null,null);};r.readAsDataURL(f);ev.target.value='';};
let qPhotoKey=null;
window.qPhotoFor=function(key){qPhotoKey=key;$('qcam').click();};
window.onQPhoto=function(ev){const f=ev.target.files[0];if(!f||!qPhotoKey)return;const key=qPhotoKey;const r=new FileReader();r.onload=e=>{const fin=(la,ln)=>stamp(e.target.result,la,ln,(d)=>{ensureA(key).photo=d.dataUrl;refreshNC(key);});if(navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>fin(p.coords.latitude,p.coords.longitude),()=>fin(null,null),{enableHighAccuracy:true,timeout:6000,maximumAge:0});}else fin(null,null);};r.readAsDataURL(f);ev.target.value='';};
function stamp(dataUrl,lat,lng,cb){const img=new Image();img.onload=()=>{const mx=1100,sc=Math.min(1,mx/img.width),w=Math.round(img.width*sc),hh=Math.round(img.height*sc);const cv=document.createElement('canvas');cv.width=w;cv.height=hh;const x=cv.getContext('2d');x.drawImage(img,0,0,w,hh);const n=new Date(),d=n.toLocaleDateString('en-GB'),t=n.toLocaleTimeString('en-GB');const loc=(lat!=null)?('Lat '+lat.toFixed(5)+', Lng '+lng.toFixed(5)):'Location N/A';const lines=['📍 '+loc,'🕒 '+d+'  '+t,'ETECHS'];const pad=8,fs=Math.max(13,Math.round(w*0.027));x.font='bold '+fs+'px Arial';const bh=fs*lines.length+pad*2;x.fillStyle='rgba(15,10,68,0.74)';x.fillRect(0,hh-bh,w,bh);x.fillStyle='#EC5020';x.fillRect(0,hh-bh,5,bh);x.fillStyle='#fff';x.textBaseline='top';lines.forEach((l,i)=>x.fillText(l,pad+4,hh-bh+pad+i*fs));cb({dataUrl:cv.toDataURL('image/jpeg',0.7),loc:loc,time:d+' '+t});};img.src=dataUrl;}
function renderPhotos(){const b=$('ph');if(!b)return;b.innerHTML=photos.map((p,i)=>'<div class="ph"><img src="'+p.dataUrl+'"><button class="x" onclick="delP('+i+')">×</button><div class="stamp">'+esc(p.time)+'</div></div>').join('')+'<button class="addph" onclick="addPhoto()"><span>＋</span>صورة<br>Photo</button>';upd();}
window.delP=function(i){photos.splice(i,1);renderPhotos();};

// ===== signature =====
let sigCtx,sigDrawing=false;
function initSig(){const cv=$('sig');if(!cv)return;const rect=cv.getBoundingClientRect();const dpr=window.devicePixelRatio||1;cv.width=rect.width*dpr;cv.height=160*dpr;sigCtx=cv.getContext('2d');sigCtx.scale(dpr,dpr);sigCtx.lineWidth=2.2;sigCtx.lineCap='round';sigCtx.strokeStyle='#0F0A44';
 if(sig){const im=new Image();im.onload=()=>{sigCtx.drawImage(im,0,0,rect.width,160);const hint=$('sighint');if(hint)hint.style.display='none';};im.src=sig;}
 const pos=ev=>{const r=cv.getBoundingClientRect();const tp=ev.touches?ev.touches[0]:ev;return{x:tp.clientX-r.left,y:tp.clientY-r.top};};
 const start=ev=>{ev.preventDefault();sigDrawing=true;const hint=$('sighint');if(hint)hint.style.display='none';const p=pos(ev);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);};
 const move=ev=>{if(!sigDrawing)return;ev.preventDefault();const p=pos(ev);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();};
 const end=()=>{if(!sigDrawing)return;sigDrawing=false;sig=cv.toDataURL('image/png');};
 cv.addEventListener('mousedown',start);cv.addEventListener('mousemove',move);window.addEventListener('mouseup',end);
 cv.addEventListener('touchstart',start,{passive:false});cv.addEventListener('touchmove',move,{passive:false});cv.addEventListener('touchend',end);
}
window.clearSig=function(){const cv=$('sig');if(!cv)return;sigCtx.clearRect(0,0,cv.width,cv.height);sig=null;const hint=$('sighint');if(hint)hint.style.display='block';};

window.doSubmit=async function(){
  await saveCur(false);
  const f=form(); const rules=CUR.rules||CFG.rules;
  if(!f.site||!f.loa){toast('أكمل المحطة ورقم LOA');return;}
  // required answers
  let firstMissing=null;
  TPL.forEach((st,si)=>st.secs.forEach((sec,ci)=>sec.items.forEach((it,ii)=>{
    const key=kk(si,ci,ii);const a=answers[key];
    const req = rules.allItems && itemRequired(it);
    if(req && !isAnswered(a) && !firstMissing) firstMissing=key;
    // required per-question photo
    if(itemReqPhoto(it) && (!a||!a.photo) && !firstMissing) firstMissing=key;
  })));
  if(firstMissing){toast('أكمل البنود المطلوبة');const el=$('it_'+firstMissing);if(el){el.classList.add('flag');el.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(()=>el.classList.remove('flag'),2500);}return;}
  if(rules.photo&&photos.length===0){toast('أضف صورة عامة واحدة على الأقل');$('ph').scrollIntoView({behavior:'smooth',block:'center'});return;}
  if(rules.signature&&!sig){toast('وقّع في خانة التوقيع');$('sig').scrollIntoView({behavior:'smooth',block:'center'});return;}
  if(!CFG.recipient){openSet();toast('أضف إيميل المستلم في الإعدادات');return;}
  CUR.status='done'; await saveCur(false);
  buildReport(f);
};

// ===== DASHBOARD =====
let DASH_MONTH=null; // 'YYYY-MM' filter or null=all
let DASH_PROJECT='';  // project name filter

window.openDashboard=function(){ DASH_MONTH=null; DASH_PROJECT=''; renderDashboard(); };

function reportMonth(r){ const d=(r.form&&r.form.date)||''; return d?d.slice(0,7):''; }
function allReportsForDash(){
  // reports already cached in REPORTS via snapshot; if empty, will show zeros
  return REPORTS.slice();
}
function dashFiltered(){
  let list=allReportsForDash();
  if(DASH_MONTH) list=list.filter(r=>reportMonth(r)===DASH_MONTH);
  if(DASH_PROJECT) list=list.filter(r=>((r.form&&r.form.project)||'')===DASH_PROJECT);
  return list;
}
function aggregate(list){
  let total=list.length, done=0, draft=0, items=0, ok=0, no=0, na=0, ncOpen=0;
  const ncs=[]; const projects={};
  list.forEach(r=>{
    if(r.status==='done')done++; else draft++;
    const c=r.counts||{}; items+=c.total||0; ok+=c.ok||0; no+=c.no||0; na+=c.na||0;
    const pj=(r.form&&r.form.project)||'(بدون مشروع)';
    projects[pj]=projects[pj]||{count:0,nc:0};
    projects[pj].count++;
    // pull findings from answers (Not OK / No)
    const tpl=r.tpl||[];
    tpl.forEach((st,si)=>st.secs&&st.secs.forEach((sec,ci)=>sec.items.forEach((it,ii)=>{
      const a=(r.answers||{})[si+'_'+ci+'_'+ii];
      if(a&&((a.status==='Not OK')||(a.yn==='No'))){
        ncOpen++; projects[pj].nc++;
        ncs.push({site:(r.form&&r.form.site)||'',project:pj,item:it[0],finding:a.finding||'',action:a.action||'',date:(r.form&&r.form.date)||'',by:r.ownerName||''});
      }
    })));
  });
  const compliance = (ok+no)? Math.round(ok/(ok+no)*100) : 0;
  return {total,done,draft,items,ok,no,na,ncOpen,compliance,ncs,projects};
}

function renderDashboard(){
  const list=dashFiltered();
  const ag=aggregate(list);
  const months=[...new Set(allReportsForDash().map(reportMonth).filter(Boolean))].sort().reverse();
  const projNames=[...new Set(allReportsForDash().map(r=>(r.form&&r.form.project)||'').filter(Boolean))];
  let h='<header class="bar"><button class="menubtn" onclick="renderHome()">‹</button>'+
   '<img src="'+LOGO+'"><div class="t"><b>لوحة المعلومات</b><span>Dashboard & KPIs</span></div></header><div class="stripe"></div>';
  h+='<div class="wrap">';
  // filters
  h+='<div class="card"><div class="body" style="display:flex;gap:10px;flex-wrap:wrap">'+
     '<div style="flex:1;min-width:140px"><label class="fld">الشهر / Month</label><select onchange="dashSetMonth(this.value)"><option value="">الكل / All</option>'+months.map(m=>'<option value="'+m+'"'+(DASH_MONTH===m?' selected':'')+'>'+m+'</option>').join('')+'</select></div>'+
     '<div style="flex:1;min-width:140px"><label class="fld">المشروع / Project</label><select onchange="dashSetProject(this.value)"><option value="">الكل / All</option>'+projNames.map(p=>'<option'+(DASH_PROJECT===p?' selected':'')+'>'+esc(p)+'</option>').join('')+'</select></div>'+
     '</div></div>';
  // KPI cards
  h+='<div class="kpis">'+
     kpi('التقارير','Total Reports',ag.total,NAVY)+
     kpi('مقفولة','Closed',ag.done,'#1B8A3A')+
     kpi('مفتوحة','Open',ag.draft,'#EC5020')+
     kpi('عدم مطابقة','Non-Conf.',ag.ncOpen,'#C0392B')+
     '</div>';
  // compliance donut + bars
  h+='<div class="card"><h3>الالتزام / Compliance <small>'+(DASH_MONTH||'كل الفترات')+'</small></h3><div class="body">'+
     '<div class="dashrow"><div class="donut2" style="background:conic-gradient('+ORANGE+' 0 '+ag.compliance+'%, #e8e8ee '+ag.compliance+'% 100%)"><div class="hole2"><b>'+ag.compliance+'%</b></div></div>'+
     '<div style="flex:1">'+dbar('مطابق OK',ag.ok,ag.ok+ag.no+ag.na,'#1B8A3A')+dbar('غير مطابق',ag.no,ag.ok+ag.no+ag.na,'#C0392B')+dbar('N/A',ag.na,ag.ok+ag.no+ag.na,'#8a8a93')+'</div></div>'+
     '</div></div>';
  // per-project performance
  const pjk=Object.keys(ag.projects);
  if(pjk.length){
    h+='<div class="card"><h3>أداء المشاريع / Projects</h3><div class="body">';
    pjk.forEach(p=>{const o=ag.projects[p];h+='<div class="prow"><span class="pn">'+esc(p)+'</span><span class="pc">'+o.count+' تقرير</span>'+(o.nc?'<span class="pnc">'+o.nc+' عدم مطابقة</span>':'<span class="pok">✓</span>')+'</div>';});
    h+='</div></div>';
  }
  // non-conformities list
  h+='<div class="card"><h3>عدم المطابقة / Non-Conformities <small>'+ag.ncs.length+'</small></h3><div class="body">';
  if(ag.ncs.length){
    h+=ag.ncs.map(n=>'<div class="ncitem"><div class="ncsite">'+esc(n.site)+' · '+esc(n.date)+'</div><div class="nctitle">'+esc(n.item)+'</div>'+(n.finding?'<div class="ncf">🔎 '+esc(n.finding)+'</div>':'')+(n.action?'<div class="nca">➤ '+esc(n.action)+'</div>':'')+'</div>').join('');
  } else h+='<div class="empty">لا توجد حالات عدم مطابقة في هذه الفترة. ✓</div>';
  h+='</div></div>';
  h+='</div><div class="toast" id="toast"></div>';
  $('app').innerHTML=h;
}

function kpi(ar,en,val,col){return '<div class="kpi" style="border-top:3px solid '+col+'"><div class="kv" style="color:'+col+'">'+val+'</div><div class="kl">'+ar+'</div><div class="kle">'+en+'</div></div>';}

// Admin "provisions" a user by pre-creating their profile (role). Their auth account is created on first login.
window.addUser=async function(){
  const n=($('u_name').value||'').trim(),e=($('u_email').value||'').trim().toLowerCase(),p=($('u_pass').value||'').trim();
  if(!n||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(e)||p.length<6){toast('أكمل البيانات (مرور 6+)');return;}
  // We store a pending profile keyed by email; on first login the uid-doc is created with this role/name.
  try{
    await setDoc(doc(db,'pending',e),{name:n,role:'user',pass:p,created:serverTimestamp()});
    toast('تم تجهيز المستخدم — يدخل بالإيميل وكلمة المرور');
    $('u_name').value='';$('u_email').value='';$('u_pass').value='';

  ruleRow('allItems','إلزام البنود الإجبارية','كل بند مُعلَّم كإجباري يجب أن يُجاب',r.allItems)+

  ruleRow('signature','إلزام التوقيع','توقيع المنفّذ مطلوب',r.signature)+
  '<p class="note">تُطبَّق على التقارير الجديدة.</p></div></div>';}
function ruleRow(key,title,desc,on){return '<div class="rulerow"><div class="ui"><b>'+title+'</b><span>'+desc+'</span></div><button class="toggle'+(on?' on':'')+'" onclick="toggleRule(\''+key+'\',this)"><i></i></button></div>';}
window.toggleRule=async function(key,btn){CFG.rules[key]=!CFG.rules[key];btn.classList.toggle('on',CFG.rules[key]);await saveConfig();};

function answerDisplay(a,it){
  const tp=itemType(it);
  if(tp==='okna'){const s=a&&a.status||'—';const cl=s==='OK'?'ok':s==='Not OK'?'no':s==='N/A'?'na':'';return {txt:s,cl};}
  if(tp==='yesno'){const s=a&&a.yn?(a.yn==='Yes'?'Yes / نعم':'No / لا'):'—';return {txt:s,cl:a&&a.yn==='Yes'?'ok':a&&a.yn==='No'?'no':''};}
  if(tp==='rating'){const r=a&&a.rating||0;return {txt:'★'.repeat(r)+'☆'.repeat(5-r)+' ('+r+'/5)',cl:r>=4?'ok':r>=2?'na':r>0?'no':''};}
  if(tp==='text'){return {txt:esc(a&&a.text||'—'),cl:''};}
  if(tp==='measure'){return {txt:esc(a&&a.measure||'—')+' '+esc(itemUnit(it)),cl:''};}
  if(tp==='choice'){return {txt:esc(a&&a.choice||'—'),cl:''};}
  return {txt:'—',cl:''};
}
function buildReport(f){
  const c=counts();
  const pct=c.done?Math.round(c.ok/c.done*100):0;
  const rec=CFG.recipient;
  let rows='', ncList='';
  TPL.forEach((st,si)=>{
    rows+='<tr><td colspan="3" class="stg">'+esc(st.en)+'</td></tr>';
    st.secs.forEach((sec,ci)=>{
      rows+='<tr><td colspan="3" class="secr">'+esc(sec.en)+'</td></tr>';
      sec.items.forEach((it,ii)=>{
        const a=answers[kk(si,ci,ii)]||{};const disp=answerDisplay(a,it);
        let extra='';
        if(a.remark)extra+='<div class="rm">↳ '+esc(a.remark)+'</div>';
        if(a.photo)extra+='<div style="margin-top:4px"><img src="'+a.photo+'" style="height:80px;border-radius:5px;border:1px solid #ddd"></div>';
        rows+='<tr><td>'+esc(it[0])+'<div class="ar">'+esc(it[1])+'</div>'+extra+'</td><td class="cr">'+esc(it[2])+'</td><td class="pill '+disp.cl+'">'+disp.txt+'</td></tr>';
        // collect findings
        if((itemType(it)==='okna'&&a.status==='Not OK')||(itemType(it)==='yesno'&&a.yn==='No')){
          ncList+='<tr><td>'+esc(it[0])+'</td><td>'+esc(a.finding||'-')+'</td><td>'+esc(a.action||'-')+'</td></tr>';
        }
      });
    });
  });
  const ncSection = ncList? '<div class="h2">Findings & Required Actions / الملاحظات والإجراءات</div><table class="nctab"><tr><th>البند / Item</th><th>Finding / الملاحظة</th><th>Required Action / الإجراء</th></tr>'+ncList+'</table>' : '';
  let pics=photos.map(p=>'<div class="pc"><img src="'+p.dataUrl+'"><div class="pcap">'+esc(p.time)+'</div></div>').join('');
  const dash='<div class="dash"><div class="donut" style="background:conic-gradient('+ORANGE+' 0 '+pct+'%, #e6e6ee '+pct+'% 100%)"><div class="hole"><b>'+pct+'%</b><span>Compliance</span></div></div>'+
    '<div class="bars">'+bar('OK / Yes',c.ok,c.total,'#1B8A3A')+bar('Not OK / No',c.no,c.total,'#C0392B')+bar('N/A',c.na,c.total,'#8a8a93')+'</div></div>';
  const sigBlock=sig?'<img src="'+sig+'" style="height:70px;max-width:240px;border-bottom:1px solid #333">':'______________________';
  const rep=
  '<!DOCTYPE html><html lang="ar"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QAQC Report</title><style>'+
  '*{box-sizing:border-box}body{font-family:Arial,Tahoma,sans-serif;margin:0;color:#1c1c28;font-size:13px}'+
  '.hd{background:'+NAVY+';color:#fff;padding:14px 18px;display:flex;align-items:center;gap:14px}'+
  '.hd img{height:46px;background:#fff;border-radius:6px;padding:3px}.hd .ti{margin-inline-start:auto;text-align:right}.hd b{font-size:17px}.hd span{font-size:11px;opacity:.85}'+
  '.or{height:5px;background:'+ORANGE+'}.sec1{padding:16px 18px}'+
  '.h2{color:'+NAVY+';font-size:15px;font-weight:800;border-bottom:2px solid #eee;padding-bottom:5px;margin:14px 0 10px}'+
  '.info{display:grid;grid-template-columns:1fr 1fr;gap:6px 24px}.info div{font-size:12.5px}.info b{color:'+NAVY+'}'+
  '.dash{display:flex;align-items:center;gap:24px;margin:6px 0;flex-wrap:wrap}.donut{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center}'+
  '.hole{width:78px;height:78px;background:#fff;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center}.hole b{font-size:22px;color:'+NAVY+'}.hole span{font-size:9px;color:#888}'+
  '.bars{flex:1;min-width:220px}.brow{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:12px}.brow .lb{width:84px;font-weight:800}.track{flex:1;height:15px;background:#eee;border-radius:8px;overflow:hidden}.fillb{height:100%;border-radius:8px}'+
  'table{width:100%;border-collapse:collapse;margin-top:6px}td,th{border-bottom:1px solid #eee;padding:7px 8px;vertical-align:top;font-size:12px;text-align:start}'+
  '.stg{background:'+ORANGE+';color:#fff;font-weight:800}.secr{background:#FCE4D6;color:'+NAVY+';font-weight:800;font-size:11.5px}'+
  '.ar{color:#666;font-size:11px}.rm{color:#777;font-size:11px;margin-top:3px}.cr{color:#999;font-size:11px;width:80px}'+
  '.pill{font-weight:800;text-align:center;color:#555}.pill.ok{color:#1B8A3A}.pill.no{color:#C0392B}.pill.na{color:#8a8a93}'+
  '.nctab th{background:#fbeae6;color:'+NAVY+';font-weight:800;font-size:11px}'+
  '.wd{background:#f7f7fb;border-inline-start:4px solid '+ORANGE+';padding:10px 12px;border-radius:6px;font-size:12.5px;white-space:pre-wrap}'+
  '.pics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}.pc img{width:100%;border:1px solid #ddd;border-radius:6px}.pcap{font-size:10px;color:#888}'+
  '.sign{margin-top:18px;border-top:2px solid #eee;padding-top:12px;font-size:12.5px}.sign p{margin:6px 0}'+
  '.toolbar{position:sticky;top:0;background:#fff;padding:10px;display:flex;gap:8px;border-bottom:1px solid #eee;z-index:9}'+
  '.toolbar button{flex:1;padding:13px;border:0;border-radius:10px;font-size:15px;font-weight:800;color:#fff;cursor:pointer}.tp{background:'+ORANGE+'}.te{background:'+NAVY+'}'+
  '@media print{.toolbar{display:none}}</style></head><body>'+
  '<div class="toolbar"><button class="tp" onclick="window.print()">حفظ PDF / طباعة</button><button class="te" onclick="sendMail()">إرسال بالإيميل</button></div>'+
  '<div class="hd"><img src="'+LOGO+'"><div class="ti"><b>MAINTENANCE QA/QC REPORT</b><br><span>Equipment & Technical Services Co. (ETECHS)</span></div></div><div class="or"></div>'+
  '<div class="sec1"><div class="h2">Work Order Information / بيانات أمر العمل</div>'+
  '<div class="info"><div><b>Project:</b> '+esc(f.project||'-')+'</div><div><b>Client:</b> '+esc(f.client||'-')+'</div>'+
  '<div><b>Contract:</b> '+esc(f.contract||'-')+'</div><div><b>City:</b> '+esc(f.city||'-')+'</div>'+
  '<div><b>Site:</b> '+esc(f.site)+'</div><div><b>LOA:</b> '+esc(f.loa)+'</div>'+
  '<div><b>Service:</b> '+esc(f.service)+'</div><div><b>System:</b> '+esc(f.system)+'</div>'+
  '<div><b>Team:</b> '+esc(f.team)+'</div><div><b>Date:</b> '+esc(f.date)+'</div>'+
  '<div><b>By:</b> '+esc(f.by||SESSION.name)+'</div></div>'+
  '<div class="h2">Inspection Summary / ملخص التدقيق</div>'+dash+
  (f.workdone?'<div class="h2">Work Done / وصف العمل</div><div class="wd">'+esc(f.workdone)+'</div>':'')+
  ncSection+
  '<div class="h2">Detailed Results / النتائج التفصيلية</div><table>'+rows+'</table>'+
  (f.notes?'<div class="h2">Site Notes / ملاحظات</div><div>'+esc(f.notes)+'</div>':'')+
  (pics?'<div class="h2">Site Photos / الصور</div><div class="pics">'+pics+'</div>':'')+
  '<div class="sign"><div class="h2">Sign-off / الاعتماد</div><p><b>Performed by / نفّذ:</b> '+esc(f.by||SESSION.name)+' ('+esc(SESSION.email)+')</p>'+
  '<div><b>التوقيع / Signature:</b><br>'+sigBlock+'</div>'+
  '<p style="color:#888;font-size:11px;margin-top:10px">Generated: '+new Date().toLocaleString('en-GB')+'</p></div></div>'+
  '<script>function sendMail(){var s=encodeURIComponent("Maintenance QA\\/QC Report - '+esc(f.site)+' - '+esc(f.date)+'");var b=encodeURIComponent("Site: '+esc(f.site)+'\\nLOA: '+esc(f.loa)+'\\nProject: '+esc(f.project)+'\\nClient: '+esc(f.client)+'\\nContract: '+esc(f.contract)+'\\nBy: '+esc(f.by||SESSION.name)+'\\nCompliance: '+pct+'%\\n\\nالرجاء إرفاق ملف الـPDF بعد حفظه.");location.href="mailto:'+rec+'?subject="+s+"&body="+b;}<\/script>'+
  '</body></html>';
  const w=window.open('','_blank');
  if(w){w.document.open();w.document.write(rep);w.document.close();toast('افتح «حفظ PDF» في أعلى التقرير');}
  else{const blob=new Blob([rep],{type:'text/html'});const url=URL.createObjectURL(blob);location.href=url;}
  setTimeout(()=>{CUR=null;renderHome();},1400);
}
function bar(lb,v,tot,col){const w=tot?Math.max(4,Math.round(v/tot*100)):0;return '<div class="brow"><span class="lb">'+lb+'</span><div class="track"><div class="fillb" style="width:'+w+'%;background:'+col+'"></div></div><b>'+v+'</b></div>';}
